<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abstract capability proof</title>
  <desc id="desc">A flat abstract proof map with connected evidence blocks and a central capability mark.</desc>
  <defs>
    <pattern id="paperGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#333849" stroke-width="1" opacity=".28"/>
    </pattern>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 0V12" stroke="#E8E4D9" stroke-width="2" opacity=".13"/>
    </pattern>
    <filter id="softGrain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .12"/>
      </feComponentTransfer>
      <feBlend mode="soft-light" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#0F1117"/>
  <rect width="1600" height="900" fill="url(#paperGrid)" opacity=".72"/>
